<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoBot Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;min-height:100vh}
a{color:#58a6ff;text-decoration:none}
button{cursor:pointer;font-family:inherit}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#161b22;border-bottom:1px solid #30363d}
.topbar h1{font-size:18px;font-weight:700;color:#58a6ff;display:flex;align-items:center;gap:8px}
.topbar h1 span{font-size:20px}
.topbar .right{display:flex;align-items:center;gap:12px}
.topbar select{padding:6px 10px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px}

.main{max-width:1200px;margin:0 auto;padding:20px 24px}

.section{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:16px;overflow:hidden}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #30363d;cursor:pointer;user-select:none}
.section-hdr h2{font-size:14px;font-weight:600;color:#e6edf3;display:flex;align-items:center;gap:8px}
.section-hdr .badge{background:#30363d;color:#8b949e;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.section-hdr .actions{display:flex;gap:8px}
.section-body{padding:12px 16px}

.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.device-card{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.device-card:hover{border-color:#58a6ff}
.device-card input[type=checkbox]{width:16px;height:16px;accent-color:#58a6ff}
.device-card .info{flex:1;min-width:0}
.device-card .name{font-size:13px;font-weight:600;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-card .meta{font-size:11px;color:#8b949e;margin-top:2px}
.device-card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.device-card .dot.online{background:#3fb950}
.device-card .dot.offline{background:#f85149}

.suite-list{display:flex;flex-direction:column;gap:6px}
.suite-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px}
.suite-item input[type=radio]{accent-color:#58a6ff}
.suite-item .name{flex:1;font-size:13px;font-weight:500}
.suite-item .count{font-size:11px;color:#8b949e}
.suite-item .preview-btn{font-size:11px;color:#58a6ff;background:none;border:none;padding:2px 6px}

.action-bar{display:flex;align-items:center;gap:12px;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:16px}
.action-bar .btn{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;border:none;color:#fff}
.action-bar .btn-run{background:#238636}
.action-bar .btn-run:hover{background:#2ea043}
.action-bar .btn-run:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
.action-bar .btn-secondary{background:#21262d;border:1px solid #30363d;color:#e6edf3}
.action-bar .btn-secondary:hover{background:#30363d}
.action-bar .status{flex:1;font-size:12px;color:#8b949e;text-align:right}

.result-list{display:flex;flex-direction:column;gap:6px}
.result-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;font-size:12px}
.result-item .icon{font-size:16px}
.result-item .device{font-weight:600;color:#e6edf3;min-width:120px}
.result-item .detail{flex:1;color:#8b949e}
.result-item .time{color:#484f58;font-size:11px}
.result-item.passed{border-color:#238636}
.result-item.failed{border-color:#f85149}
.result-item.running{border-color:#d29922}

.empty{text-align:center;padding:24px;color:#484f58;font-size:13px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #30363d}
.modal-hdr h3{font-size:14px;font-weight:600}
.modal-hdr .close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer}
.modal-body{padding:16px}
.modal-body textarea{width:100%;min-height:200px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:10px;font-family:'SF Mono',Consolas,monospace;font-size:12px;resize:vertical}
.modal-body pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:11px;overflow-x:auto;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid #30363d}

@media(max-width:768px){
  .main{padding:12px}
  .device-grid{grid-template-columns:1fr}
  .action-bar{flex-wrap:wrap}
}
</style>
</head>
<body>
<div class="topbar">
  <h1><span>🤖</span> AutoBot Dashboard</h1>
  <div class="right">
    <select id="project-select"><option value="">-- Select Project --</option></select>
    <button class="btn-secondary" style="padding:6px 12px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px" id="btn-guide">? Guide</button>
    <button class="btn-secondary" style="padding:6px 12px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px" id="btn-connect-help">+ Add Device</button>
  </div>
</div>

<div class="main">
  <div class="section" id="sec-devices">
    <div class="section-hdr">
      <h2>📱 Devices <span class="badge" id="device-count">0</span></h2>
      <div class="actions"><button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-refresh-devices">↻ Refresh</button></div>
    </div>
    <div class="section-body">
      <div class="device-grid" id="device-list"><div class="empty">No devices online</div></div>
    </div>
  </div>

  <div class="section" id="sec-suites">
    <div class="section-hdr">
      <h2>📋 Test Suites <span class="badge" id="suite-count">0</span></h2>
      <div class="actions">
        <button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-import">Import</button>
        <button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-paste">Paste JSON</button>
      </div>
    </div>
    <div class="section-body">
      <div class="suite-list" id="suite-list"><div class="empty">No suites loaded</div></div>
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>

  <div class="action-bar">
    <button class="btn btn-run" id="btn-run" disabled>▶ Run on selected devices</button>
    <button class="btn btn-secondary" id="btn-ai-gen" style="background:#21262d;border:1px solid #30363d">✨ AI Generate</button>
    <span class="status" id="run-status"></span>
  </div>

  <div class="section" id="sec-stages">
    <div class="section-hdr">
      <h2>🚀 Stages <span class="badge" id="stage-status">—</span></h2>
      <div class="actions"><button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-refresh-stages">↻</button></div>
    </div>
    <div class="section-body">
      <div id="stage-list"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-run" id="btn-stage-all" style="font-size:12px;padding:6px 14px">▶ Run S1→S5 All</button>
      </div>
      <div style="font-size:11px;color:#8b949e;margin-top:6px" id="stage-progress-info"></div>
    </div>
  </div>

  <div class="section" id="sec-results">
    <div class="section-hdr">
      <h2>📊 Results</h2>
    </div>
    <div class="section-body">
      <div class="result-list" id="result-list"><div class="empty">No results yet</div></div>
    </div>
  </div>

  <div class="section" id="sec-history">
    <div class="section-hdr">
      <h2>🕒 History</h2>
      <div class="actions">
        <button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-clear-history">Clear all</button>
        <button class="btn-secondary" style="font-size:11px;padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="btn-refresh-history">↻ Refresh</button>
      </div>
    </div>
    <div class="section-body">
      <div class="result-list" id="history-list"><div class="empty">No history</div></div>
    </div>
  </div>
</div>

<div id="modal-container"></div>

<script src="dashboard.js"></script>
</body>
</html>
